# FORGE v0.2 Master Configuration
# See: FORGE_ARCHITECTURE_v0.2.md §13.1
#
# All paths are relative to the project root unless absolute.
# API keys are referenced as environment variable names — never plaintext.
#
# ─── DGX Spark Bootstrap Configuration ───
# This config targets a single DGX Spark (GB10, 128GB unified memory)
# running Nemotron 3 Super via Ollama, inside a NemoClaw/OpenShell sandbox.
# Frontier APIs are called for review roles only.

forge_version: "0.2"

# ─── Model Configuration ───
# Local models: Ollama on DGX Spark (OpenAI-compatible /v1 endpoint).
# Frontier models: API calls via env var keys.
#
# Ollama serves OpenAI-compatible API on port 11434 by default.
# Model names match what's pulled in Ollama (e.g. `ollama pull nemotron`).
models:
  local:
    planner:
      endpoint: "http://localhost:11434/v1"
      model: "nemotron"  # Nemotron 3 Super 120B — pulled via Ollama
      role: "Mission decomposition, milestone planning, quality review"
      max_tokens: 8192
      temperature: 0.3
      # Note: Nemotron 3 Super at FP4 fits in ~32GB of 128GB unified memory.
      # Leaves ample room for worker inference in parallel.

    worker:
      endpoint: "http://localhost:11434/v1"
      model: "nemotron"  # Same model, same endpoint — Ollama handles concurrency.
      role: "Code generation, test writing, bug fixing, lint resolution"
      max_tokens: 4096
      temperature: 0.2
      lora_path: null  # Path to LoRA adapter if fine-tuned (Phase 2+)
      # When Qwen 3.5 becomes available via Ollama, swap to:
      #   model: "qwen3.5:35b"
      # Smaller model = faster iteration, lower memory, boundary data point.

  frontier:
    reviewer:
      provider: "anthropic"
      model: "claude-sonnet-4-20260318"
      api_key_env: "ANTHROPIC_API_KEY"
      role: "Primary reviewer (Phase 1)"

    escalation_reviewer:
      provider: "openai"
      model: "gpt-5.3-codex"
      api_key_env: "OPENAI_API_KEY"
      role: "Escalation reviewer (on 2nd failure)"

    # Phase 2+ only — chairman synthesis
    chairman:
      provider: "anthropic"
      model: "claude-opus-4-20260318"
      api_key_env: "ANTHROPIC_API_KEY"
      role: "Chairman synthesis (Phase 2+)"

    # Optional — intelligence/research role (Grok)
    intelligence:
      provider: "xai"
      model: "grok-3"
      api_key_env: "XAI_API_KEY"
      role: "Web/community research (not code review)"

# ─── Gate Configuration ───
# Controls review routing, iteration limits, and shadow mode.
gate:
  phase: 1
  shadow_mode: true  # Phase 1: always true. Human merges every commit.
  default_reviewer: "reviewer"  # References models.frontier.reviewer
  escalation_reviewer: "escalation_reviewer"
  max_iterations: 3  # Max review iterations before recovery mode
  recovery_threshold: 3  # Consecutive failures to trigger recovery

  # Phase 2+ trust parameters (designed but not active in Phase 1)
  trust:
    consecutive_successes_to_promote: 10
    failure_reset_factor: 0.5
    architectural_drift_reset: true  # Full trust reset on architectural-drift
    sensitive_paths:
      - "src/auth/**"
      - "src/payments/**"
      - "src/config/**"
      - "migrations/**"
    auto_merge_min_trust: 0.95
    auto_merge_max_blast_radius: "low"

# ─── Enforcement Configuration ───
# Three layers: hooks (L1), architectural linters (L2), Desloppify (L3a/L3b)
enforcement:
  hooks_file: ".forge/hooks.yaml"
  architecture_file: ".forge/architecture.yaml"

  desloppify:
    mechanical:
      enabled: true
      run_on: "post_commit"  # Runs in post-commit hook
      thresholds:
        dead_code_max: 5
        duplication_max: 3
        complexity_max: 10        # Cyclomatic complexity per function
        function_length_max: 50   # Lines per function body
        nesting_depth_max: 4      # Max indent level

    subjective:
      enabled: true
      run_on: "milestone_boundary"  # Runs when GPU is free
      min_score_to_advance: 60     # Score threshold to advance milestone
      model: "planner"             # Uses planner model for quality review

# ─── Benchmark Configuration ───
# Fixed task suite for controlled harness comparison.
benchmarks:
  cartridge_dir: ".forge/benchmarks"
  results_dir: ".forge/benchmark-results"
  default_timeout_seconds: 600
  max_iterations_per_cartridge: 5

# ─── Observability Configuration ───
# OpenTelemetry → DuckDB pipeline for traces, metrics, and boundary data.
observability:
  trace_db: ".forge/traces/forge.duckdb"
  boundary_data: ".forge/boundary-data.jsonl"
  shadow_log: ".forge/shadow-log.jsonl"
  digest:
    enabled: true
    schedule: "daily"  # Generate at end of day
    output_dir: ".forge/digests"

# ─── Skill Configuration ───
# Crystallization pipeline settings and promotion thresholds.
skills:
  prompts_dir: ".forge/skills/prompts"
  patterns_dir: ".forge/skills/patterns"
  max_injected_skills: 5       # Max skills injected per task
  max_injection_tokens: 500    # Token budget for skill injection
  promotion:
    tier0_to_tier1_observations: 2   # Same pattern seen N times → Tier 1
    tier1_to_tier2_applications: 5   # Applied successfully M times → Tier 2
    tier2_to_tier3_applications: 10  # Stable for P applications → Tier 3
    tier3_requires_human_approval: true  # Phase 1 safety: human approves Tier 3

# ─── Environment Setup Notes ───
# This section is documentation only, not parsed by FORGE.
#
# Required environment variables:
#   ANTHROPIC_API_KEY  — for Sonnet/Opus reviewer + chairman
#   OPENAI_API_KEY     — for GPT-5.3-Codex escalation reviewer
#   XAI_API_KEY        — for Grok intelligence role (optional)
#
# Ollama setup on DGX Spark:
#   1. Install Ollama: curl -fsSL https://ollama.com/install.sh | sh
#   2. Pull Nemotron: ollama pull nemotron
#      (Downloads ~87GB — Nemotron 3 Super 120B)
#   3. Verify: curl http://localhost:11434/v1/models
#   4. Ollama auto-starts on boot via systemd
#
# NemoClaw sandbox (if using OpenShell):
#   The Ollama endpoint inside the sandbox routes via OpenShell's
#   inference policy layer. From inside the sandbox, use:
#     endpoint: "http://host.docker.internal:11434/v1"
#   or whatever the gateway maps to. The nemoclaw onboard wizard
#   auto-detects Ollama and configures the route.
#
# To verify local model is responding:
#   curl http://localhost:11434/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"nemotron","messages":[{"role":"user","content":"Hello"}]}'
